{% extends 'store/base.html' %}

{% block content %}
<div style="font-family: sans-serif; max-width: 500px; margin: 50px auto; background: white; padding: 35px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); text-align: center;">
    
    <div style="font-size: 50px; margin-bottom: 15px;">⚠️</div>
    <h2 style="color: #dc3545; margin-top: 0; font-size: 24px; font-weight: bold;">Confirm Removal</h2>
    
    <p style="color: #555; font-size: 16px; line-height: 1.5; margin-bottom: 30px; padding: 0 10px;">
        Are you absolutely sure you want to completely remove <br>
        <strong style="color: #000; font-size: 17px;">"{{ product.brand }} - {{ product.name }}"</strong>?<br>
        <span style="color: #dc3545; font-size: 13px; font-weight: bold; display: block; margin-top: 10px;">This action cannot be reversed.</span>
    </p>

    <form method="POST">
        {% csrf_token %}
        <div style="display: flex; gap: 15px; justify-content: center;">
            <button type="submit" style="background: #dc3545; color: white; border: none; padding: 12px 35px; font-weight: bold; border-radius: 4px; cursor: pointer; font-size: 14px; width: 50%;">
                Yes, Delete
            </button>
            <a href="{% url 'inventory_list' %}" style="background: #6c757d; color: white; padding: 12px 35px; text-decoration: none; font-weight: bold; border-radius: 4px; font-size: 14px; width: 50%; box-sizing: border-box; display: flex; align-items: center; justify-content: center;">
                Cancel
            </a>
        </div>
    </form>
</div>
{% endblock content %}
