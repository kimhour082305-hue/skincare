{% extends 'store/base.html' %}

{% block content %}
<div style="max-width: 600px; margin: 100px auto; text-align: center; font-family: 'Inter', sans-serif;">

    <div style="font-size: 56px; color: #16a34a; margin-bottom: 20px; line-height: 1;">
        ✓
    </div>

    <h1
        style="font-family: 'Playfair Display', Georgia, serif; font-size: 36px; color: #111; margin: 0 0 15px 0; font-weight: 500;">
        Order Successful
    </h1>

    <p
        style="color: #555; font-size: 15px; line-height: 1.6; max-width: 480px; margin: 0 auto 40px auto; font-weight: 400;">
        Thank you for your purchase. We are preparing your order and will contact you for delivery shortly.
    </p>

    <div>
        <a href="{% url 'index' %}"
            style="display: inline-block; background: #c9184a; color: white; text-decoration: none; padding: 14px 35px; border-radius: 6px; font-size: 13px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; transition: opacity 0.2s ease;">
            Continue Shopping
        </a>
    </div>

</div>
{% endblock content %}
